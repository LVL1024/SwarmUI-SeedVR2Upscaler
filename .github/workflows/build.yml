name: Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 06:00 UTC - catches upstream SwarmUI API breakage
    - cron: '0 6 * * *'

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          path: extension

      - name: Checkout SwarmUI
        uses: actions/checkout@v4
        with:
          repository: mcmonkeyprojects/SwarmUI
          path: swarmui

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build SwarmUI core
        run: dotnet build src/SwarmUI.csproj --configuration Release -o ./src/bin/live_release
        working-directory: swarmui

      - name: Install extension into SwarmUI
        run: cp -r extension swarmui/src/Extensions/SwarmUI-SeedVR2Upscaler

      - name: Build extension
        working-directory: swarmui
        run: |
          EXT_DIR=src/Extensions/SwarmUI-SeedVR2Upscaler
          OUT_DIR=src/bin/extensions/SwarmExtensionSwarmUI-SeedVR2Upscaler
          OBJ_DIR=src/obj/extensions/SwarmExtensionSwarmUI-SeedVR2Upscaler

          # Generate the .csproj the same way SwarmUI does at startup
          cat > "$EXT_DIR/SwarmAutoGenExtensionProjectFile.csproj" << 'CSPROJ'
          <Project Sdk="Microsoft.NET.Sdk.Web">
              <PropertyGroup>
                  <AssemblyName>SwarmExtensionSwarmUI-SeedVR2Upscaler</AssemblyName>
              </PropertyGroup>
              <Import Project="../../SwarmUI.extension.props" />
          </Project>
          CSPROJ

          dotnet build "$EXT_DIR/SwarmAutoGenExtensionProjectFile.csproj" \
            --configuration Release \
            -o "$(pwd)/$OUT_DIR" \
            "-p:BaseIntermediateOutputPath=$(pwd)/$OBJ_DIR/;TargetName=SwarmExtensionSwarmUI-SeedVR2Upscaler" \
            2>&1 | tee build_ext.log

          # Fail on C# compiler warnings (catches deprecation issues like #17)
          if grep -q "warning CS" build_ext.log; then
            echo "::error::Extension build produced C# compiler warnings"
            exit 1
          fi

          # Verify the DLL was produced
          if [ ! -f "$OUT_DIR/SwarmExtensionSwarmUI-SeedVR2Upscaler.dll" ]; then
            echo "::error::Extension DLL was not produced"
            exit 1
          fi

          echo "Extension built successfully with 0 warnings"

      - name: Create issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Build broken against latest SwarmUI';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-build-failure',
            });
            if (issues.find(i => i.title === title)) {
              console.log('Issue already exists, skipping');
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `The nightly build against the latest SwarmUI master failed.\n\n[View workflow run](${runUrl})\n\nThis usually means SwarmUI introduced API changes that need to be adapted to.`,
              labels: ['ci-build-failure'],
            });
